name: Unsigned macOS Pre-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Build unsigned universal DMG
        env:
          LOCALWRAP_VERSION: ${{ github.ref_name }}
        run: |
          LOCALWRAP_VERSION="${LOCALWRAP_VERSION#v}" ./script/release_unsigned_macos.sh
      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release view "${GITHUB_REF_NAME}" || gh release create "${GITHUB_REF_NAME}" --draft --prerelease --title "${GITHUB_REF_NAME} — unsigned pre-release" --notes-file RELEASE_NOTES.md
      - name: Upload unsigned DMG and checksum
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" .build/LocalWrapMac-Unsigned/*.dmg .build/LocalWrapMac-Unsigned/*.sha256 --clobber
      - name: Check out Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: tcballard/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Update Homebrew Cask
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          SHA256="$(cat ".build/LocalWrapMac-Unsigned/LocalWrap-${VERSION}-universal.dmg.sha256")"
          ./script/render_homebrew_cask.sh homebrew-tap/Casks/localwrap.rb "$VERSION" "$SHA256"
          ruby -c homebrew-tap/Casks/localwrap.rb
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false --prerelease
      - name: Publish Homebrew Cask
        working-directory: homebrew-tap
        run: |
          if git diff --quiet -- Casks/localwrap.rb; then
            echo "Cask is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/localwrap.rb
          git commit -m "Update LocalWrap to ${GITHUB_REF_NAME#v}"
          git push origin HEAD:main
