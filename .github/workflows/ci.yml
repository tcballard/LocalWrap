name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # Tests run on every OS because the process code has win32-specific paths
    # (shell spawning, taskkill) that otherwise only run at release time.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Lint, formatting, and audit are platform-independent; run them once.
      - run: npm run lint
        if: matrix.os == 'ubuntu-latest'

      - run: npm run format:check
        if: matrix.os == 'ubuntu-latest'

      - run: npm test

      # Surface high-severity advisories without blocking unrelated PRs.
      # Dependabot opens the actual fix PRs (see .github/dependabot.yml).
      - name: Security audit
        if: matrix.os == 'ubuntu-latest'
        run: npm audit --audit-level=high
        continue-on-error: true

  e2e:
    runs-on: ubuntu-latest
    # Informational while the smoke test proves itself stable; remove this
    # once it has been green for a while to make it a required gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Packaged-app smoke test
        run: xvfb-run --auto-servernum npm run test:e2e
