<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalWrap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            font-size: 11px;
            background: #f0f0f0;
            color: #000;
            padding: 12px;
            min-height: 100vh;
        }
        
        .window {
            background: #f0f0f0;
            border: 1px solid #646464;
            max-width: 420px;
            margin: 20px auto;
            box-shadow: 1px 1px 0px #fff inset, -1px -1px 0px #818181 inset;
        }
        
        .titlebar {
            background: linear-gradient(to bottom, #0997ff 0%, #0053ee 100%);
            color: white;
            padding: 3px 8px;
            font-size: 11px;
            font-weight: normal;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .titlebar-text {
            display: flex;
            align-items: center;
        }
        
        .content {
            padding: 16px;
        }
        
        .section {
            margin-bottom: 16px;
        }
        
        .section-title {
            font-size: 11px;
            margin-bottom: 8px;
            color: #000;
        }
        
        .url-input {
            width: 100%;
            height: 22px;
            border: 2px inset #f0f0f0;
            padding: 2px 4px;
            font-size: 11px;
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
        }
        
        .button-group {
            text-align: right;
            margin-top: 16px;
        }
        
        .btn {
            background: #f0f0f0;
            border: 1px outset #f0f0f0;
            padding: 3px 16px;
            margin-left: 6px;
            font-size: 11px;
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            cursor: pointer;
            min-width: 75px;
            height: 23px;
        }
        
        .btn:hover {
            background: #e5f3ff;
        }
        
        .btn:active {
            border: 1px inset #f0f0f0;
        }
        
        .btn-small {
            background: #f0f0f0;
            border: 1px outset #f0f0f0;
            padding: 2px 8px;
            margin-left: 3px;
            font-size: 10px;
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            cursor: pointer;
            min-width: 40px;
            height: 18px;
        }
        
        .btn-small:hover {
            background: #e5f3ff;
        }
        
        .btn-small:active {
            border: 1px inset #f0f0f0;
        }
        
        .server-list {
            background: #fff;
            border: 1px inset #f0f0f0;
            padding: 6px;
            margin: 8px 0;
            font-size: 10px;
            max-height: 100px;
            overflow-y: auto;
        }
        
        .server-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 0;
            border-bottom: 1px dotted #ccc;
        }
        
        .server-item:last-child {
            border-bottom: none;
        }
        
        .server-url {
            font-weight: bold;
            color: #0066cc;
            cursor: pointer;
        }
        
        .server-status {
            color: #008000;
            font-size: 9px;
        }
        
        .status-bar {
            background: #f0f0f0;
            border-top: 1px solid #818181;
            padding: 4px 8px;
            font-size: 10px;
            color: #000;
        }
        
        .server-info {
            background: #fff;
            border: 1px inset #f0f0f0;
            padding: 8px;
            margin: 8px 0;
            font-size: 10px;
            white-space: pre-line;
        }
        
        .version-info {
            font-size: 10px;
            color: #666;
            text-align: center;
            margin-top: 12px;
        }

        .script-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }

        .terminal {
            background: #000;
            color: #1eff1e;
            font-family: 'Courier New', Courier, monospace;
            font-size: 10px;
            padding: 6px;
            height: 140px;
            overflow-y: auto;
            border: 1px inset #f0f0f0;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .terminal-line {
            line-height: 1.35;
        }

        .script-unavailable {
            font-size: 10px;
            color: #666;
            background: #fff;
            border: 1px inset #f0f0f0;
            padding: 8px;
        }
    </style>
</head>
<body>
    <div class="window">
        <div class="titlebar">
            <div class="titlebar-text">LocalWrap</div>
        </div>
        
        <div class="content">
            <div class="section">
                <div class="section-title">Server Control:</div>
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                    <label style="font-size: 10px;">Port:</label>
                    <input type="number" id="portInput" value="3000" min="1000" max="65535" 
                           style="width: 60px; height: 18px; border: 1px inset #f0f0f0; padding: 1px 3px; font-size: 10px;">
                    <button class="btn-small" id="startServerBtn">Start</button>
                    <button class="btn-small" id="stopServerBtn">Stop</button>
                    <button class="btn-small" id="restartServerBtn">Restart</button>
                </div>
            </div>
            
            <div class="section">
                <div class="section-title">Running Servers:</div>
                <div class="server-list" id="serverList">Loading...</div>
            </div>
            
            <div class="section" id="scriptSection">
                <div class="section-title">Run a Dev Script:</div>

                <div id="scriptUnavailable" class="script-unavailable" style="display: none;">
                    Running dev scripts is available in the LocalWrap desktop app.
                </div>

                <div id="scriptControls">
                    <div class="script-row">
                        <label style="font-size: 10px;">Dir:</label>
                        <input type="text" id="workingDirInput" placeholder="Current directory" readonly
                               style="flex: 1; height: 18px; border: 1px inset #f0f0f0; padding: 1px 3px; font-size: 10px;">
                        <button class="btn-small" id="browseDirBtn">Browse</button>
                        <button class="btn-small" id="resetDirBtn">Reset</button>
                    </div>
                    <div class="script-row">
                        <input type="text" id="scriptInput" placeholder="npm start"
                               style="flex: 1; height: 18px; border: 1px inset #f0f0f0; padding: 1px 3px; font-size: 10px;">
                        <label style="font-size: 10px;">Port:</label>
                        <input type="number" id="scriptPortInput" value="3001" min="1000" max="65535"
                               style="width: 60px; height: 18px; border: 1px inset #f0f0f0; padding: 1px 3px; font-size: 10px;">
                        <button class="btn-small" id="runScriptBtn">Run</button>
                        <button class="btn-small" id="stopScriptBtn" disabled>Stop</button>
                    </div>
                    <div class="terminal" id="scriptTerminal" aria-label="Script output"></div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Quick Access:</div>
                <div class="button-group">
                    <button class="btn" id="openServerBtn">Open Server</button>
                    <button class="btn" id="refreshBtn">Refresh</button>
                    <button class="btn" id="closeBtn">Close</button>
                </div>
            </div>
        </div>
        
        <div class="status-bar">
            Ready | LocalWrap Development Server
        </div>
    </div>
    
    <div class="version-info">
        LocalWrap v2.0 - Desktop Development Server
    </div>

    <script src="app.js"></script>
</body>
</html>
