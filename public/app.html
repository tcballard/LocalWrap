<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; object-src 'none'; frame-src 'none'; base-uri 'none'; form-action 'none';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LocalWrap</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        padding: 8px;
        background: #d8d8d8;
        color: #111;
        font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
        font-size: 12px;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .window {
        display: flex;
        flex-direction: column;
        min-height: calc(100vh - 16px);
        border: 1px solid #4d4d4d;
        background: #f0f0f0;
        box-shadow:
          1px 1px 0 #fff inset,
          -1px -1px 0 #7d7d7d inset;
      }

      .titlebar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 24px;
        padding: 3px 8px;
        background: linear-gradient(to bottom, #1479d4 0%, #064a9d 100%);
        color: #fff;
      }

      .titlebar-title {
        font-weight: 600;
      }

      .titlebar-meta {
        font-size: 11px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        padding: 6px;
        border-bottom: 1px solid #8a8a8a;
        background: #ececec;
      }

      .toolbar-spacer {
        flex: 1;
      }

      .btn-icon {
        margin-right: 4px;
        color: #064a9d;
        font-weight: 700;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(220px, 280px) minmax(0, 1fr);
        flex: 1;
        min-height: 0;
      }

      .sidebar {
        display: flex;
        flex-direction: column;
        min-height: 0;
        border-right: 1px solid #8a8a8a;
        background: #e6e6e6;
      }

      .sidebar-header,
      .panel-header {
        padding: 8px;
        border-bottom: 1px solid #b5b5b5;
        font-weight: 600;
      }

      .project-list {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 6px;
      }

      .project-row {
        display: grid;
        grid-template-columns: 12px minmax(0, 1fr);
        gap: 6px;
        width: 100%;
        min-height: 42px;
        margin-bottom: 4px;
        padding: 5px;
        border: 1px solid #a1a1a1;
        background: #fff;
        color: #111;
        text-align: left;
        cursor: pointer;
      }

      .project-row:hover,
      .project-row.selected {
        background: #dfefff;
        border-color: #2f6ea8;
      }

      .status-dot {
        width: 9px;
        height: 9px;
        margin-top: 3px;
        border: 1px solid #555;
        background: #bbb;
      }

      .status-dot.ready {
        background: #1d9b45;
      }

      .status-dot.running,
      .status-dot.starting,
      .status-dot.running-unresponsive {
        background: #d9a600;
      }

      .status-dot.error,
      .status-dot.failed {
        background: #c63434;
      }

      .project-name {
        overflow: hidden;
        font-weight: 600;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .project-subtitle {
        overflow: hidden;
        color: #555;
        font-size: 11px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .main {
        display: flex;
        min-width: 0;
        min-height: 0;
        flex-direction: column;
      }

      .detail {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        flex: 1;
        min-height: 0;
      }

      .detail[hidden] {
        display: none;
      }

      .setup {
        border-bottom: 1px solid #8a8a8a;
        background: #f0f0f0;
      }

      .section-header {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
        min-height: 30px;
        padding: 5px 8px;
        border-bottom: 1px solid #c5c5c5;
        background: #ececec;
      }

      .section-title {
        color: #003c74;
        font-weight: 600;
      }

      .section-summary {
        margin-left: 8px;
        color: #555;
        font-size: 11px;
      }

      .form {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 7px;
        padding: 7px;
      }

      .form[hidden] {
        display: none;
      }

      .group-box {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        grid-column: span 12;
        gap: 6px;
        min-width: 0;
        min-inline-size: 0;
        padding: 8px 7px 7px;
        border: 1px solid #9a9a9a;
        background: #f5f5f5;
      }

      .group-box legend {
        padding: 0 5px;
        color: #003c74;
        font-weight: 600;
      }

      .field {
        display: flex;
        min-width: 0;
        flex-direction: column;
        gap: 3px;
      }

      .field label {
        color: #333;
        font-size: 11px;
      }

      .field input,
      .field select {
        width: 100%;
        height: 23px;
        border: 1px inset #f0f0f0;
        padding: 3px 5px;
        background: #fff;
      }

      .field.invalid input,
      .field.invalid select {
        border-color: #a22222;
        background: #fff4f4;
      }

      .field.warning input,
      .field.warning select {
        border-color: #9a7600;
        background: #fff9df;
      }

      .field-message {
        min-height: 11px;
        color: #666;
        font-size: 10px;
      }

      .field.invalid .field-message {
        color: #a22222;
      }

      .field.warning .field-message {
        color: #755900;
      }

      .notice {
        display: none;
        grid-column: span 12;
        min-height: 22px;
        align-items: center;
        padding: 5px 7px;
        border: 1px solid #d1b44c;
        background: #fff7d7;
        color: #4c3a00;
      }

      .notice.error {
        border-color: #b45a5a;
        background: #fff0f0;
        color: #7c1515;
      }

      .notice.info {
        border-color: #7f9db9;
        background: #eef5ff;
        color: #003c74;
      }

      .notice.visible {
        display: flex;
      }

      .span-2 {
        grid-column: span 2;
      }

      .span-3 {
        grid-column: span 3;
      }

      .span-4 {
        grid-column: span 4;
      }

      .span-5 {
        grid-column: span 5;
      }

      .span-6 {
        grid-column: span 6;
      }

      .span-7 {
        grid-column: span 7;
      }

      .span-8 {
        grid-column: span 8;
      }

      .span-12 {
        grid-column: span 12;
      }

      .inline-field {
        display: flex;
        gap: 6px;
        align-items: end;
      }

      .inline-field .field {
        flex: 1;
      }

      .checks {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        min-height: 25px;
      }

      .check {
        display: inline-flex;
        gap: 5px;
        align-items: center;
        white-space: nowrap;
      }

      .check input {
        width: auto;
        height: auto;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: end;
        justify-content: flex-end;
      }

      .btn {
        min-width: 72px;
        height: 23px;
        padding: 2px 8px;
        border: 1px outset #f0f0f0;
        background: #f0f0f0;
        color: #111;
        cursor: pointer;
      }

      .btn:hover:not(:disabled) {
        background: #e5f3ff;
      }

      .btn:active:not(:disabled) {
        border: 1px inset #f0f0f0;
      }

      .btn:disabled {
        color: #777;
        cursor: default;
      }

      .btn:disabled .btn-icon {
        color: #777;
      }

      .btn.primary {
        border-color: #4b83bd;
        background: #dfefff;
      }

      .runtime {
        display: grid;
        grid-template-rows: auto auto auto auto minmax(0, 1fr);
        min-height: 0;
        overflow: hidden;
      }

      .preview {
        margin: 6px 8px 0;
        border: 1px solid #9a9a9a;
        background: #f7f7f7;
        box-shadow:
          1px 1px 0 #fff inset,
          -1px -1px 0 #d2d2d2 inset;
      }

      .preview[hidden] {
        display: none;
      }

      .preview-header {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
        padding: 5px 7px;
        border-bottom: 1px solid #c5c5c5;
      }

      .preview-title {
        color: #003c74;
        font-weight: 600;
      }

      .preview-url {
        margin-left: 8px;
        color: #333;
      }

      .preview-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .preview-viewport {
        position: relative;
        height: clamp(180px, 30vh, 300px);
        min-height: 180px;
        margin: 6px;
        border: 1px inset #f0f0f0;
        background: #fff;
        overflow: hidden;
      }

      .preview-placeholder {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        color: #666;
      }

      .doctor {
        margin: 6px 8px 0;
        border: 1px solid #9a9a9a;
        background: #f7f7f7;
        box-shadow:
          1px 1px 0 #fff inset,
          -1px -1px 0 #d2d2d2 inset;
      }

      .doctor-header {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
        padding: 5px 7px;
        border-bottom: 1px solid #c5c5c5;
      }

      .doctor-title {
        color: #003c74;
        font-weight: 600;
      }

      .doctor-summary {
        margin-left: 8px;
        color: #333;
      }

      .doctor-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .doctor-checks {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1px;
        padding: 5px;
      }

      .doctor-row {
        display: grid;
        grid-template-columns: 34px 92px minmax(0, 1fr) auto;
        gap: 5px;
        align-items: center;
        min-height: 24px;
        padding: 2px 4px;
        border: 1px solid transparent;
        background: #fff;
      }

      .doctor-row.warn {
        background: #fff9df;
      }

      .doctor-row.fail {
        background: #fff0f0;
      }

      .doctor-row.running {
        background: #eef5ff;
      }

      .doctor-state {
        color: #003c74;
        font-weight: 700;
        text-align: center;
      }

      .doctor-row.warn .doctor-state {
        color: #755900;
      }

      .doctor-row.fail .doctor-state {
        color: #a22222;
      }

      .doctor-label {
        font-weight: 600;
      }

      .doctor-message {
        overflow: hidden;
        color: #444;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .doctor-row .btn {
        min-width: 82px;
      }

      .doctor-timeline {
        min-height: 20px;
        padding: 3px 7px 5px;
        color: #555;
        font-size: 11px;
      }

      .doctor.collapsed .doctor-checks,
      .doctor.collapsed .doctor-timeline {
        display: none;
      }

      .runtime-header {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
        padding: 6px 8px;
        border-bottom: 1px solid #b5b5b5;
      }

      .runtime-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        color: #333;
      }

      .badge {
        min-width: 74px;
        padding: 3px 8px;
        border: 1px solid #777;
        background: #fff;
        text-align: center;
      }

      .badge.ready {
        border-color: #18823a;
        background: #dff7e6;
      }

      .badge.running,
      .badge.starting,
      .badge.running-unresponsive {
        border-color: #9a7600;
        background: #fff2bf;
      }

      .badge.error,
      .badge.failed {
        border-color: #a22222;
        background: #ffe2e2;
      }

      .log-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .runtime-title {
        color: #003c74;
        font-weight: 600;
      }

      .command-reveal {
        margin: 6px 8px 0;
        border: 1px inset #f0f0f0;
        background: #fff;
        padding: 6px;
        color: #333;
        font-family: 'Courier New', Courier, monospace;
        font-size: 11px;
        word-break: break-word;
      }

      .command-reveal[hidden] {
        display: none;
      }

      .terminal {
        min-height: 0;
        margin: 6px 8px 8px;
        border: 1px inset #f0f0f0;
        background: #050505;
        color: #31ff31;
        overflow-y: auto;
        padding: 8px;
        font-family: 'Courier New', Courier, monospace;
        font-size: 11px;
        line-height: 1.4;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .empty {
        display: none;
        flex: 1;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 10px;
        color: #555;
      }

      .empty-task {
        width: min(320px, calc(100% - 32px));
        border: 1px solid #7f9db9;
        background: #eef5ff;
        padding: 14px;
        box-shadow:
          1px 1px 0 #fff inset,
          -1px -1px 0 #c7d9ee inset;
        text-align: center;
      }

      .empty-title {
        margin-bottom: 10px;
        color: #003c74;
        font-weight: 600;
      }

      .empty.visible {
        display: flex;
      }

      .status-bar {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
        min-height: 25px;
        padding: 5px 8px;
        border-top: 1px solid #8a8a8a;
        background: #ececec;
        color: #222;
      }

      .status-bar span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .status-right {
        color: #555;
        font-size: 11px;
      }

      @media (max-width: 820px) {
        body {
          padding: 0;
        }

        .window {
          min-height: 100vh;
          border: 0;
        }

        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          min-height: 190px;
          border-right: 0;
          border-bottom: 1px solid #8a8a8a;
        }

        .form {
          grid-template-columns: repeat(6, minmax(0, 1fr));
        }

        .group-box {
          grid-template-columns: repeat(6, minmax(0, 1fr));
        }

        .span-12,
        .span-8,
        .span-7,
        .span-6,
        .span-5,
        .span-4,
        .span-3 {
          grid-column: span 6;
        }

        .span-2 {
          grid-column: span 3;
        }

        .doctor-checks {
          grid-template-columns: 1fr;
        }

        .preview-viewport {
          height: 220px;
        }
      }
    </style>
  </head>
  <body>
    <div class="window">
      <div class="titlebar">
        <div class="titlebar-title">LocalWrap</div>
        <div class="titlebar-meta" id="versionLabel">v2.5</div>
      </div>

      <div class="toolbar">
        <button class="btn primary" id="addProjectBtn">
          <span class="btn-icon">+</span>Add Project
        </button>
        <button class="btn" id="saveProjectBtn" disabled>
          <span class="btn-icon">✓</span>Save
        </button>
        <button class="btn" id="deleteProjectBtn" disabled>
          <span class="btn-icon">×</span>Delete
        </button>
        <span class="toolbar-spacer"></span>
        <button class="btn" id="refreshBtn"><span class="btn-icon">↻</span>Refresh</button>
      </div>

      <div class="layout">
        <aside class="sidebar">
          <div class="sidebar-header">Projects</div>
          <div class="project-list" id="projectList"></div>
        </aside>

        <main class="main">
          <div class="empty visible" id="emptyState">
            <div class="empty-task">
              <div class="empty-title">No projects saved</div>
              <button class="btn primary" id="emptyAddProjectBtn">
                <span class="btn-icon">+</span>Add Project
              </button>
            </div>
          </div>

          <section class="detail" id="projectDetail" hidden>
            <div class="setup" id="setupPanel">
              <div class="section-header">
                <div>
                  <span class="section-title">Project Setup</span>
                  <span class="section-summary" id="setupSummary">Directory, command, and URL</span>
                </div>
                <button class="btn" id="toggleSetupBtn">
                  <span class="btn-icon">▾</span>Collapse
                </button>
              </div>

              <div class="form" id="setupFields">
                <div class="notice" id="draftNotice"></div>

                <fieldset class="group-box">
                  <legend>Project</legend>
                  <div class="field span-4" id="nameField">
                    <label for="nameInput">Name</label>
                    <input type="text" id="nameInput" autocomplete="off" />
                    <div class="field-message" id="nameMessage"></div>
                  </div>

                  <div class="field span-8" id="cwdField">
                    <label for="cwdInput">Directory</label>
                    <div class="inline-field">
                      <div class="field">
                        <input type="text" id="cwdInput" readonly />
                      </div>
                      <button class="btn" id="browseDirBtn">
                        <span class="btn-icon">▣</span>Browse
                      </button>
                    </div>
                    <div class="field-message" id="cwdMessage"></div>
                  </div>
                </fieldset>

                <fieldset class="group-box">
                  <legend>Launch</legend>
                  <div class="field span-5" id="commandField">
                    <label for="commandInput">Command</label>
                    <input
                      type="text"
                      id="commandInput"
                      autocomplete="off"
                      placeholder="npm run dev"
                    />
                    <div class="field-message" id="commandMessage"></div>
                  </div>

                  <div class="field span-3">
                    <label for="scriptSelect">Package Script</label>
                    <select id="scriptSelect">
                      <option value="">None found</option>
                    </select>
                  </div>

                  <div class="field span-2" id="portField">
                    <label for="portInput">Port</label>
                    <input type="number" id="portInput" min="1000" max="65535" value="3000" />
                    <div class="field-message" id="portMessage"></div>
                  </div>

                  <div class="field span-4" id="urlField">
                    <label for="urlInput">App URL</label>
                    <input
                      type="text"
                      id="urlInput"
                      autocomplete="off"
                      placeholder="http://localhost:3000"
                    />
                    <div class="field-message" id="urlMessage"></div>
                  </div>

                  <div class="actions span-8">
                    <button class="btn primary" id="startProjectBtn">
                      <span class="btn-icon">▶</span>Start
                    </button>
                    <button class="btn" id="stopProjectBtn">
                      <span class="btn-icon">■</span>Stop
                    </button>
                    <button class="btn" id="restartProjectBtn">
                      <span class="btn-icon">↻</span>Restart
                    </button>
                    <button class="btn" id="openProjectBtn">
                      <span class="btn-icon">↗</span>Open
                    </button>
                    <button class="btn" id="previewProjectBtn">
                      <span class="btn-icon">▣</span>Preview
                    </button>
                  </div>
                </fieldset>

                <fieldset class="group-box">
                  <legend>Options</legend>
                  <div class="field span-12">
                    <label>Startup</label>
                    <div class="checks">
                      <label class="check">
                        <input type="checkbox" id="autostartInput" />
                        Autostart
                      </label>
                      <label class="check">
                        <input type="checkbox" id="openOnReadyInput" />
                        Open when ready
                      </label>
                    </div>
                  </div>
                </fieldset>
              </div>
            </div>

            <div class="runtime">
              <div class="preview" id="previewPanel" hidden>
                <div class="preview-header">
                  <div>
                    <span class="preview-title">Preview</span>
                    <span class="preview-url" id="previewUrlLabel">http://localhost:3000</span>
                  </div>
                  <div class="preview-actions">
                    <button class="btn" id="reloadPreviewBtn">
                      <span class="btn-icon">↻</span>Reload
                    </button>
                    <button class="btn" id="openPreviewExternalBtn">
                      <span class="btn-icon">↗</span>Browser
                    </button>
                    <button class="btn" id="closePreviewBtn">
                      <span class="btn-icon">×</span>Close
                    </button>
                  </div>
                </div>
                <div class="preview-viewport" id="previewViewport">
                  <div class="preview-placeholder" id="previewPlaceholder">Loading...</div>
                </div>
              </div>

              <div class="doctor" id="doctorPanel">
                <div class="doctor-header">
                  <div>
                    <span class="doctor-title">Project Doctor</span>
                    <span class="doctor-summary" id="doctorSummary">Not checked yet.</span>
                  </div>
                  <div class="doctor-actions">
                    <button class="btn" id="copyDoctorReportBtn">
                      <span class="btn-icon">□</span>Copy Report
                    </button>
                    <button class="btn" id="revealProjectDirBtn">
                      <span class="btn-icon">▣</span>Reveal Folder
                    </button>
                    <button class="btn" id="toggleDoctorBtn">
                      <span class="btn-icon">▾</span>Collapse
                    </button>
                  </div>
                </div>
                <div class="doctor-checks" id="doctorChecks"></div>
                <div class="doctor-timeline" id="doctorTimeline">No checks yet.</div>
              </div>

              <div class="runtime-header">
                <div class="runtime-meta">
                  <span class="runtime-title">Output</span>
                  <span class="badge" id="statusBadge">Stopped</span>
                  <span id="pidLabel">PID: -</span>
                  <span id="readinessLabel"></span>
                </div>
                <div class="log-actions">
                  <button class="btn" id="revealCommandBtn">
                    <span class="btn-icon">›_</span>Command
                  </button>
                  <button class="btn" id="copyLogsBtn"><span class="btn-icon">□</span>Copy</button>
                  <button class="btn" id="clearLogsBtn">
                    <span class="btn-icon">×</span>Clear
                  </button>
                </div>
                <span id="urlLabel">http://localhost:3000</span>
              </div>
              <div class="command-reveal" id="commandReveal" hidden></div>
              <div class="terminal" id="terminal" aria-label="Project output"></div>
            </div>
          </section>
        </main>
      </div>

      <div class="status-bar" aria-live="polite">
        <span id="statusBar">Ready</span>
        <span class="status-right" id="statusRight">No project selected</span>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
