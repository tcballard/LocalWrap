<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; object-src 'none'; frame-src 'none'; base-uri 'none'; form-action 'none';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LocalWrap</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        padding: 12px;
        background: #d8d8d8;
        color: #111;
        font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
        font-size: 12px;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .window {
        display: flex;
        flex-direction: column;
        min-height: calc(100vh - 24px);
        border: 1px solid #4d4d4d;
        background: #f0f0f0;
        box-shadow:
          1px 1px 0 #fff inset,
          -1px -1px 0 #7d7d7d inset;
      }

      .titlebar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 26px;
        padding: 4px 8px;
        background: linear-gradient(to bottom, #1479d4 0%, #064a9d 100%);
        color: #fff;
      }

      .titlebar-title {
        font-weight: 600;
      }

      .titlebar-meta {
        font-size: 11px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        padding: 8px;
        border-bottom: 1px solid #8a8a8a;
        background: #ececec;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(220px, 280px) minmax(0, 1fr);
        flex: 1;
        min-height: 0;
      }

      .sidebar {
        display: flex;
        flex-direction: column;
        min-height: 0;
        border-right: 1px solid #8a8a8a;
        background: #e6e6e6;
      }

      .sidebar-header,
      .panel-header {
        padding: 8px;
        border-bottom: 1px solid #b5b5b5;
        font-weight: 600;
      }

      .project-list {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 6px;
      }

      .project-row {
        display: grid;
        grid-template-columns: 12px minmax(0, 1fr);
        gap: 6px;
        width: 100%;
        min-height: 48px;
        margin-bottom: 5px;
        padding: 6px;
        border: 1px solid #a1a1a1;
        background: #fff;
        color: #111;
        text-align: left;
        cursor: pointer;
      }

      .project-row:hover,
      .project-row.selected {
        background: #dfefff;
        border-color: #2f6ea8;
      }

      .status-dot {
        width: 9px;
        height: 9px;
        margin-top: 3px;
        border: 1px solid #555;
        background: #bbb;
      }

      .status-dot.ready {
        background: #1d9b45;
      }

      .status-dot.running,
      .status-dot.starting {
        background: #d9a600;
      }

      .status-dot.error {
        background: #c63434;
      }

      .project-name {
        overflow: hidden;
        font-weight: 600;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .project-subtitle {
        overflow: hidden;
        color: #555;
        font-size: 11px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .main {
        display: flex;
        min-width: 0;
        min-height: 0;
        flex-direction: column;
      }

      .detail {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        flex: 1;
        min-height: 0;
      }

      .form {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 8px;
        padding: 10px;
        border-bottom: 1px solid #8a8a8a;
      }

      .field {
        display: flex;
        min-width: 0;
        flex-direction: column;
        gap: 3px;
      }

      .field label {
        color: #333;
        font-size: 11px;
      }

      .field input,
      .field select {
        width: 100%;
        height: 25px;
        border: 1px inset #f0f0f0;
        padding: 3px 5px;
        background: #fff;
      }

      .span-2 {
        grid-column: span 2;
      }

      .span-3 {
        grid-column: span 3;
      }

      .span-4 {
        grid-column: span 4;
      }

      .span-5 {
        grid-column: span 5;
      }

      .span-6 {
        grid-column: span 6;
      }

      .span-7 {
        grid-column: span 7;
      }

      .span-12 {
        grid-column: span 12;
      }

      .inline-field {
        display: flex;
        gap: 6px;
        align-items: end;
      }

      .inline-field .field {
        flex: 1;
      }

      .checks {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        min-height: 25px;
      }

      .check {
        display: inline-flex;
        gap: 5px;
        align-items: center;
        white-space: nowrap;
      }

      .check input {
        width: auto;
        height: auto;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: end;
        justify-content: flex-end;
      }

      .btn {
        min-width: 78px;
        height: 25px;
        padding: 3px 10px;
        border: 1px outset #f0f0f0;
        background: #f0f0f0;
        color: #111;
        cursor: pointer;
      }

      .btn:hover:not(:disabled) {
        background: #e5f3ff;
      }

      .btn:active:not(:disabled) {
        border: 1px inset #f0f0f0;
      }

      .btn:disabled {
        color: #777;
        cursor: default;
      }

      .btn.primary {
        border-color: #4b83bd;
        background: #dfefff;
      }

      .runtime {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 0;
      }

      .runtime-header {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
        padding: 8px 10px;
        border-bottom: 1px solid #b5b5b5;
      }

      .runtime-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        color: #333;
      }

      .badge {
        min-width: 74px;
        padding: 3px 8px;
        border: 1px solid #777;
        background: #fff;
        text-align: center;
      }

      .badge.ready {
        border-color: #18823a;
        background: #dff7e6;
      }

      .badge.running,
      .badge.starting {
        border-color: #9a7600;
        background: #fff2bf;
      }

      .badge.error {
        border-color: #a22222;
        background: #ffe2e2;
      }

      .terminal {
        min-height: 0;
        margin: 10px;
        border: 1px inset #f0f0f0;
        background: #050505;
        color: #31ff31;
        overflow-y: auto;
        padding: 8px;
        font-family: 'Courier New', Courier, monospace;
        font-size: 11px;
        line-height: 1.4;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .empty {
        display: none;
        flex: 1;
        align-items: center;
        justify-content: center;
        color: #555;
      }

      .empty.visible {
        display: flex;
      }

      .status-bar {
        min-height: 25px;
        padding: 5px 8px;
        border-top: 1px solid #8a8a8a;
        background: #ececec;
        color: #222;
      }

      @media (max-width: 820px) {
        body {
          padding: 0;
        }

        .window {
          min-height: 100vh;
          border: 0;
        }

        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          min-height: 190px;
          border-right: 0;
          border-bottom: 1px solid #8a8a8a;
        }

        .form {
          grid-template-columns: repeat(6, minmax(0, 1fr));
        }

        .span-7,
        .span-6,
        .span-5,
        .span-4,
        .span-3 {
          grid-column: span 6;
        }

        .span-2 {
          grid-column: span 3;
        }
      }
    </style>
  </head>
  <body>
    <div class="window">
      <div class="titlebar">
        <div class="titlebar-title">LocalWrap</div>
        <div class="titlebar-meta" id="versionLabel">v2.3</div>
      </div>

      <div class="toolbar">
        <button class="btn primary" id="newProjectBtn">New</button>
        <button class="btn" id="saveProjectBtn" disabled>Save</button>
        <button class="btn" id="deleteProjectBtn" disabled>Delete</button>
        <button class="btn" id="refreshBtn">Refresh</button>
      </div>

      <div class="layout">
        <aside class="sidebar">
          <div class="sidebar-header">Projects</div>
          <div class="project-list" id="projectList"></div>
        </aside>

        <main class="main">
          <div class="empty visible" id="emptyState">No projects saved.</div>

          <section class="detail" id="projectDetail" hidden>
            <div class="form">
              <div class="field span-4">
                <label for="nameInput">Name</label>
                <input type="text" id="nameInput" autocomplete="off" />
              </div>

              <div class="field span-6">
                <label for="cwdInput">Directory</label>
                <div class="inline-field">
                  <div class="field">
                    <input type="text" id="cwdInput" readonly />
                  </div>
                  <button class="btn" id="browseDirBtn">Browse</button>
                </div>
              </div>

              <div class="field span-2">
                <label for="portInput">Port</label>
                <input type="number" id="portInput" min="1000" max="65535" value="3000" />
              </div>

              <div class="field span-5">
                <label for="commandInput">Command</label>
                <input type="text" id="commandInput" autocomplete="off" placeholder="npm run dev" />
              </div>

              <div class="field span-3">
                <label for="scriptSelect">Package Script</label>
                <select id="scriptSelect">
                  <option value="">None found</option>
                </select>
              </div>

              <div class="field span-4">
                <label for="urlInput">App URL</label>
                <input
                  type="text"
                  id="urlInput"
                  autocomplete="off"
                  placeholder="http://localhost:3000"
                />
              </div>

              <div class="field span-5">
                <label>Launch</label>
                <div class="checks">
                  <label class="check">
                    <input type="checkbox" id="autostartInput" />
                    Autostart
                  </label>
                  <label class="check">
                    <input type="checkbox" id="openOnReadyInput" />
                    Open when ready
                  </label>
                </div>
              </div>

              <div class="actions span-7">
                <button class="btn primary" id="startProjectBtn">Start</button>
                <button class="btn" id="stopProjectBtn">Stop</button>
                <button class="btn" id="restartProjectBtn">Restart</button>
                <button class="btn" id="openProjectBtn">Open</button>
              </div>
            </div>

            <div class="runtime">
              <div class="runtime-header">
                <div class="runtime-meta">
                  <span class="badge" id="statusBadge">Stopped</span>
                  <span id="pidLabel">PID: -</span>
                </div>
                <span id="urlLabel">http://localhost:3000</span>
              </div>
              <div class="terminal" id="terminal" aria-label="Project output"></div>
            </div>
          </section>
        </main>
      </div>

      <div class="status-bar" id="statusBar" aria-live="polite">Ready</div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
